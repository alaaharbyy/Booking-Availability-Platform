services:
  postgres:
    image: postgres:18-alpine

    container_name: travel-booking-postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booking-availability-platform}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql
  
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  
  
  redis:
    image: redis:7-alpine
    container_name: travel-booking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: